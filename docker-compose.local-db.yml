version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sbeamp_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      # Connect to local PostgreSQL database
      # For Mac/Windows: use host.docker.internal
      # For Linux: use your machine's IP or network_mode: "host"
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: sbeampdb
      DB_USER: postgres
      DB_PASSWORD: admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: "*"
      ADMIN_EMAIL: admin@ampcus.com
      ADMIN_PASSWORD: Admin#456789
      ADMIN_NAME: Admin User
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm run migrate && npm run create-admin && npm run dev"
    # For Linux, uncomment the line below and remove DB_HOST above
    # network_mode: "host"

volumes:
  postgres_data:
